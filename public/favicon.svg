<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#060a10"/>
  <!-- Outer hexagon -->
  <polygon points="16,2 27,8.5 27,23.5 16,30 5,23.5 5,8.5"
    fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.9"/>
  <!-- Inner filled hex -->
  <polygon points="16,7.5 22,11 22,21 16,24.5 10,21 10,11"
    fill="rgba(0,200,255,0.12)" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
  <!-- Six outer nodes -->
  <circle cx="16" cy="2"    r="1.8" fill="#22d3ee"/>
  <circle cx="27" cy="8.5"  r="1.8" fill="#22d3ee"/>
  <circle cx="27" cy="23.5" r="1.8" fill="#22d3ee"/>
  <circle cx="16" cy="30"   r="1.8" fill="#22d3ee"/>
  <circle cx="5"  cy="23.5" r="1.8" fill="#22d3ee"/>
  <circle cx="5"  cy="8.5"  r="1.8" fill="#22d3ee"/>
  <!-- Centre node (brightest) -->
  <circle cx="16" cy="16" r="2.8" fill="#22d3ee"/>
  <!-- Three alternating spokes -->
  <line x1="16" y1="16" x2="16" y2="2"    stroke="#22d3ee" stroke-width="0.9" opacity="0.55"/>
  <line x1="16" y1="16" x2="27" y2="23.5" stroke="#22d3ee" stroke-width="0.9" opacity="0.55"/>
  <line x1="16" y1="16" x2="5"  y2="23.5" stroke="#22d3ee" stroke-width="0.9" opacity="0.55"/>
</svg>